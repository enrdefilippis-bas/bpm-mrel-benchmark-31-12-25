# Render.com Infrastructure-as-Code config
# Doc: https://render.com/docs/blueprint-spec
#
# Serve la dashboard HTML statica del CdA (dashboard_mrel_cda_2025q4.html)
# via nginx leggero. Il Dockerfile rigenera la dashboard a ogni build dai
# dati in data/processed/ così resta sempre allineata al codice.

services:
  - type: web
    name: bpm-mrel-benchmark
    env: docker
    region: frankfurt
    plan: free
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    healthCheckPath: /healthz
    envVars:
      - key: PORT
        value: "8080"
